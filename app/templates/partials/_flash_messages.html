{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="mb-4 p-4 rounded-lg
                {% if category == 'success' %}bg-green-100 text-green-700 border border-green-200
                {% elif category == 'error' or category == 'danger' %}bg-red-100 text-red-700 border border-red-200
                {% elif category == 'warning' or category == 'info' %}bg-blue-100 text-blue-700 border border-blue-200
                {% else %}bg-blue-100 text-blue-700 border border-blue-200{% endif %}
                animate-fade-in">
                <div class="flex items-center gap-2">
                    <i class="fa-regular fa-circle-check"></i>
                    <span>{{ message }}</span>
                </div>
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}
