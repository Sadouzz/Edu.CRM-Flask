{% extends "base.html" %}

{% block title %}Ajouter un enseignant{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-6">
        <h1 class="text-3xl font-bold">Ajouter un enseignant</h1>
        <p class="text-gray-500 mt-1">Remplissez les informations ci-dessous</p>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="h-2 bg-gradient-to-r from-secondary-500 to-secondary-600"></div>
        <form method="POST" action="{{ url_for('teachers.create') }}" class="p-6 space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nom complet</label>
                <input type="text" name="name" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Spécialité</label>
                <input type="text" name="speciality" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500">
            </div>

            <div class="flex gap-3 pt-4">
                <button type="submit" class="flex-1 py-2 bg-primary-600 text-white font-medium rounded-lg hover:bg-primary-700">
                    Créer
                </button>
                <a href="{{ url_for('teachers.index') }}" class="flex-1 py-2 bg-gray-100 text-gray-700 font-medium rounded-lg hover:bg-gray-200 text-center">
                    Annuler
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
