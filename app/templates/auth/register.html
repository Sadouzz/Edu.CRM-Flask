{% extends "base.html" %}

{% block title %}Inscription{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden">
            <div class="h-2 bg-gradient-to-r from-secondary-500 to-primary-600"></div>
            <div class="p-8">
                <div class="text-center mb-8">
                    <h2 class="text-2xl font-bold">Créer un compte</h2>
                    <p class="text-sm text-gray-500 mt-1">Inscrivez-vous pour accéder à la plateforme</p>
                </div>
                
                <form method="POST" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nom complet</label>
                        <input type="text" name="name" required class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input type="email" name="email" required class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
                        <input type="password" name="password" required class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                    </div>
                    <button type="submit" class="w-full py-2 bg-primary-600 text-white font-medium rounded-lg hover:bg-primary-700">
                        S'inscrire
                    </button>
                </form>
                
                <p class="text-center mt-4 text-sm">
                    Déjà un compte ? <a href="{{ url_for('auth.connexion') }}" class="text-primary-600 hover:underline">Se connecter</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
