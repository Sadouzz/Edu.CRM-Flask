{% extends "base.html" %}

{% block title %}Connexion{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
    <div class="w-full max-w-md">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 overflow-hidden">
            <div class="h-2 bg-gradient-to-r from-primary-500 to-primary-600"></div>
            <div class="p-8">
                <div class="text-center mb-8">
                    <div class="w-16 h-16 bg-primary-100 dark:bg-primary-900/30 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fa-solid fa-graduation-cap text-2xl text-primary-600 dark:text-primary-400"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-900 dark:text-white">Connexion</h2>
                    <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Connectez-vous à votre espace</p>
                </div>

                <form method="POST" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Nom d'utilisateur</label>
                        <input type="text" name="username" value="admin" required
                               class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary-500 dark:bg-gray-700 dark:text-white">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Mot de passe</label>
                        <input type="password" name="password" value="admin" required
                               class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary-500 dark:bg-gray-700 dark:text-white">
                    </div>
                    <button type="submit" class="w-full py-2 bg-primary-600 hover:bg-primary-700 text-white font-medium rounded-lg transition-colors">
                        Se connecter
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
