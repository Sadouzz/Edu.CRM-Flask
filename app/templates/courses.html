{% extends "base.html" %}

{% block content %}

<h2>Courses</h2>

<h3>Create Course</h3>

<form method="POST" action="{{ url_for('courses.create_course') }}">

    <input type="text" name="title" placeholder="Course title" required>

    <select name="teacher_id">

        {% for teacher in teachers %}

        <option value="{{ teacher.id }}">
            {{ teacher.name }}
        </option>

        {% endfor %}

    </select>

    <button type="submit">Create</button>

</form>

<hr>

<h3>Courses List</h3>

<table border="1">

    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Teacher</th>
        <th>Students Count</th>
        <th>Action</th>
    </tr>

    {% for course in courses %}

    <tr>

        <td>{{ course.id }}</td>
        <td>{{ course.title }}</td>
        <td>{{ course.teacher_id }}</td>
        <td>{{ course.student_ids|length }}</td>

        <td>
            <a href="{{ url_for('courses.remove_course', id=course.id) }}">
                Delete
            </a>
        </td>

    </tr>

    {% endfor %}

</table>

{% endblock %}
