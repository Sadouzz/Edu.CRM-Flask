{% extends "base.html" %}

{% block content %}

<h2>Inscrire plusieurs étudiants — {{ course.title }}</h2>

<form method="POST" action="{{ url_for('courses.assign_students', course_id=course.id) }}">

    {% if students %}
    <p>Cochez les étudiants à inscrire :</p>

    {% for student in students %}
    <div>
        <input type="checkbox" name="student_ids" value="{{ student.id }}" id="s{{ student.id }}">
        <label for="s{{ student.id }}">{{ student.name }}</label>
    </div>
    {% endfor %}

    <br>
    <button type="submit">Inscrire les étudiants sélectionnés</button>

    {% else %}
    <p>Tous les étudiants sont déjà inscrits à ce cours.</p>
    {% endif %}

    <br>
    <a href="{{ url_for('courses.courses_list') }}">Cancel</a>

</form>

{% endblock %}
