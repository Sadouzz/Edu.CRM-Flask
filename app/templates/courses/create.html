{% extends "base.html" %}

{% block title %}Créer un cours{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-6">
        <h1 class="text-3xl font-bold">Créer un cours</h1>
        <p class="text-gray-500 mt-1">Remplissez les informations ci-dessous</p>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="h-2 bg-gradient-to-r from-primary-500 to-primary-600"></div>
        <form method="POST" action="{{ url_for('courses.create') }}" class="p-6 space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Titre du cours</label>
                <input type="text" name="title" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                <textarea name="description" rows="3"
                          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500"></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">ID de l'enseignant</label>
                <input type="number" name="teacher_id" min="1" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500">
            </div>
            
            <div class="flex gap-3 pt-4">
                <button type="submit" class="flex-1 py-2 bg-primary-600 text-white font-medium rounded-lg hover:bg-primary-700">
                    Créer
                </button>
                <a href="{{ url_for('courses.index') }}" class="flex-1 py-2 bg-gray-100 text-gray-700 font-medium rounded-lg hover:bg-gray-200 text-center">
                    Annuler
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
