<div class="bg-white rounded-xl shadow-sm overflow-hidden">
  <div class="h-32 bg-gradient-to-r from-primary-500 to-primary-600"></div>
  <div class="px-6 py-4 text-center">
    <div class="w-24 h-24 bg-primary-100 rounded-full mx-auto -mt-12 border-4 border-white flex items-center justify-center">
      <i class="fas fa-user text-3xl text-primary-600"></i>
    </div>
    <h2 class="text-xl font-bold mt-2">{{ user.name }}</h2>
    <p class="text-gray-500">{{ user.email }}</p>
    <span class="inline-block mt-2 px-3 py-1 bg-primary-100 text-primary-800 rounded-full text-sm">
      {{ user.role }}
    </span>
  </div>
</div>
