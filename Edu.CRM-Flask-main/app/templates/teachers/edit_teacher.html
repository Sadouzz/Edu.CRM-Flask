{% extends "base.html" %}

{% block content %}

<h2>Edit Teacher</h2>

<form method="POST" action="{{ url_for('teachers.edit_teacher', id=teacher.id) }}">
    <div style="margin-bottom: 10px;">
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" value="{{ teacher.name }}" required style="width: 300px; padding: 5px;">
    </div>
    
    <div style="margin-bottom: 10px;">
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" value="{{ teacher.email }}" required style="width: 300px; padding: 5px;">
    </div>
    
    <div style="margin-bottom: 10px;">
        <label for="speciality">Speciality:</label><br>
        <input type="text" id="speciality" name="speciality" value="{{ teacher.speciality }}" required style="width: 300px; padding: 5px;">
    </div>
    
    <button type="submit" style="padding: 5px 15px;">Update</button>
    <a href="{{ url_for('teachers.teachers_list') }}" style="margin-left: 10px;">Cancel</a>
</form>

{% endblock %}
