{% extends "base.html" %}

{% block content %}

<h2>Create Teacher</h2>

<form method="POST">

    <label>Name</label>
    <input type="text" name="name" required>

    <br><br>

    <label>Email</label>
    <input type="email" name="email" required>

    <br><br>

    <label>Speciality</label>
    <input type="text" name="speciality" required>

    <br><br>

    <button type="submit">Add Teacher</button>

</form>

{% endblock %}
