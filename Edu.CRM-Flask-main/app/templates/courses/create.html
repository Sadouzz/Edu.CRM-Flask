{% extends "base.html" %}

{% block content %}

<h2>Create Course</h2>

<form method="POST" action="{{ url_for('courses.create_course') }}">
    <div style="margin-bottom: 10px;">
        <label for="title">Title:</label><br>
        <input type="text" id="title" name="title" required style="width: 300px; padding: 5px;">
    </div>
    
    <div style="margin-bottom: 10px;">
        <label for="teacher_id">Teacher:</label><br>
        <select id="teacher_id" name="teacher_id" required style="width: 300px; padding: 5px;">
            <option value="">Sélectionner un enseignant</option>
            {% for teacher in teachers %}
                <option value="{{ teacher.id }}">{{ teacher.name }}</option>
            {% endfor %}
        </select>
    </div>
    
    <button type="submit" style="padding: 5px 15px;">Create</button>
    <a href="{{ url_for('courses.courses_list') }}" style="margin-left: 10px;">Cancel</a>
</form>

{% endblock %}
