{% extends "base.html" %}

{% block content %}

<h2>Edit Student</h2>

<form method="POST" action="{{ url_for('students.edit_student', id=student.id) }}">
    <div style="margin-bottom: 10px;">
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" value="{{ student.name }}" required style="width: 300px; padding: 5px;">
    </div>
    
    <div style="margin-bottom: 10px;">
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" value="{{ student.email }}" required style="width: 300px; padding: 5px;">
    </div>
    
    <button type="submit" style="padding: 5px 15px;">Update</button>
    <a href="{{ url_for('students.students_list') }}" style="margin-left: 10px;">Cancel</a>
</form>

{% endblock %}
